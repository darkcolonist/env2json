<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradients -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" /> <!-- slate-900 -->
      <stop offset="100%" stop-color="#020617" /> <!-- slate-950 -->
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" /> <!-- blue-400 -->
      <stop offset="50%" stop-color="#818cf8" /> <!-- indigo-400 -->
      <stop offset="100%" stop-color="#c084fc" /> <!-- purple-400 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="180" height="180" rx="40" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="3" />
  
  <!-- Outer Glow Ring -->
  <rect x="8" y="8" width="164" height="164" rx="32" fill="none" stroke="url(#glowGrad)" stroke-width="1.5" stroke-opacity="0.15" />

  <!-- Transformer Icon Graphics -->
  <g transform="translate(25, 25)">
    <!-- Left side: env key-value indicator (sleek toggles / key-value block) -->
    <g transform="translate(10, 35)">
      <!-- Key block -->
      <rect x="0" y="0" width="36" height="14" rx="4" fill="#3b82f6" fill-opacity="0.2" stroke="#60a5fa" stroke-width="2" />
      <line x1="8" y1="7" x2="28" y2="7" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" />
      
      <!-- Equals sign -->
      <line x1="12" y1="22" x2="24" y2="22" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
      <line x1="12" y1="27" x2="24" y2="27" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
      
      <!-- Value block -->
      <rect x="0" y="35" width="36" height="14" rx="4" fill="#818cf8" fill-opacity="0.2" stroke="#818cf8" stroke-width="2" />
      <circle cx="18" cy="42" r="3" fill="#818cf8" />
    </g>

    <!-- Center: Glowing loop/transformer arrows -->
    <g filter="url(#glow)">
      <!-- Right Arrow -->
      <path d="M 58 45 C 70 30, 90 30, 102 45" fill="none" stroke="url(#glowGrad)" stroke-width="4.5" stroke-linecap="round" />
      <path d="M 96 38 L 104 46 L 94 51" fill="none" stroke="url(#glowGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />

      <!-- Left Arrow -->
      <path d="M 102 85 C 90 100, 70 100, 58 85" fill="none" stroke="url(#glowGrad)" stroke-width="4.5" stroke-linecap="round" />
      <path d="M 64 92 L 56 84 L 66 79" fill="none" stroke="url(#glowGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <!-- Right side: JSON Curly brace -->
    <g transform="translate(100, 30)">
      <!-- Bracket Symbol { } styled elegantly -->
      <path d="M 16 10 C 6 10, 6 25, -2 28 C 6 31, 6 46, 16 46" fill="none" stroke="#c084fc" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="8" cy="28" r="3" fill="#e879f9" />
    </g>
  </g>
</svg>
